<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A melhor biblioteca de referência para comandos Python - PyLibs.">
    <title>PyLibs - O Guia Definitivo de Bibliotecas Python</title>
    <link rel="stylesheet" href="../Styles/global-style.css">
    <link rel="stylesheet" href="../Styles/header.css">
    <link rel="stylesheet" href="../Styles/section.css">
    <link rel="icon" type="image/png" href="./Styles/Icons/favicon.ico">
</head>
<body>
    <main>
        <header>
            <img id="icon-img" src="../Styles/Icons/icon.png" alt="" >
            <h1 >PyLibs</h1>
            <h2>Seu guia rápido de bibliotecas Python. Consulte comandos, copie exemplos e aprenda na prática.</h2>
        </header>
        <section class="section-tagindex-search">
            <div class="search-bar-box">
                <img id="search-icon" src="../Styles/Icons/search.png" alt="">
                <input type="search" name="" id="search-bar" placeholder="Qual biblioteca de Python você quer consultar?">
            </div>
            <div class="indexed-tags">
                <div class="tag-all">🚀 Ver Todas</div>
            </div>
        <div class="how-many-libs">
            <p><span>0</span> Biliotecas encontradas</p>
        </div>
        </section>
        <section class="content">
        </section>
        <footer>
            <p>PyLibs — O manual de sobrevivência do desenvolvedor Python.🐍</p>
            <p>Desenvolvido por Pedro Antônio Heinrich - @streetegist</p>
        </footer>
    </main>
    <script type="module" src="../Scripts/script.js" defer></script>
</body>
</html>
